<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .thank-you-container {
            background-color: #ffffff;
            padding: 3rem 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 15px #3365bc;
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        .icon-container {
            width: 80px;
            height: 80px;
            background-color: #e6f7ed;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 1.5rem;
        }

        .checkmark {
            color:#3365bc;
            font-size: 3rem;
            line-height: 1;
        }

        h1 {
            font-size: 2rem;
            color: #2c3e50;
            margin-bottom: 1rem;
        }

        p {
            color: #7f8c8d;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            background-color: #3498db;
            color: #ffffff;
            text-decoration: none;
            padding: 0.8rem 2rem;
            border-radius: 5px;
            font-weight: 600;
            transition: background-color 0.2s ease;
        }

        .btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <div class="thank-you-container">
        <div class="icon-container">
            <span class="checkmark">✓</span>
        </div>
        <h1>Thank You!</h1>
        <p>Your submission has been received successfully. We appreciate you taking the time to reach out to us. We shall contact you with any information about relevant developments.</p>
        <a href="#" class="btn">Back to Home</a>
    </div>

</body>
</html>
